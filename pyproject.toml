[project]
name = "evosite3d"
version = "0.2"
requires-python = ">=3.11"
dependencies = [
    "biopython>=1.85",
    "matplotlib",
    "pandas",
    "pandas-stubs==2.3.2.250926",
    "scipy",
    "scipy-stubs==1.16.2.4",
    "PyQt6",
    "seaborn",
    "statsmodels",
    "torch==2.5.1",
    "torchaudio==2.5.1",
    "torchdata==0.8.0",
    "torchvision==0.20.1",
]

[project.optional-dependencies]
dev = [
    "mypy>=1.5.0",
    "pre-commit>=3.0.0",
    "pylint>=3.0.0",
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.11.0",
]

[tool.setuptools.packages.find]
exclude = ["outputs*", "tutorials*", "ncbi_data*", "test_outputs*"]

[tool.ruff]
target-version = "py311"
include = ["*.py", "*.pyi"]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
